version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nexus-sqlserver
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: YourStrong@Passw0rd
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"

  rocketmq-namesrv:
    image: apache/rocketmq:5.0
    container_name: nexus-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.0
    container_name: nexus-broker
    command: sh mqbroker -n rocketmq-namesrv:9876
    ports:
      - "10911:10911"
    depends_on:
      - rocketmq-namesrv

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5
    container_name: nexus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
    ports:
      - "2379:2379"

  milvus-minio:
    image: minio/minio:latest
    container_name: nexus-minio
    command: minio server /minio_data
    ports:
      - "9000:9000"
      - "9001:9001"

  milvus-standalone:
    image: milvusdb/milvus:v2.3
    container_name: nexus-milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
    depends_on:
      - milvus-etcd
      - milvus-minio

volumes:
  sql_data: